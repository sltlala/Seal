name: check_secret

on:
  workflow_dispatch:

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
  
    - name: Debug - Check if SIGNING_KEY exists
run: |
  if [ -n "${{ secrets.SIGNING_KEY }}" ]; then
    echo "✅ SIGNING_KEY is SET. Length: ${#{{ secrets.SIGNING_KEY }}}"
  else
    echo "❌ SIGNING_KEY is EMPTY or NOT SET"
    exit 1
  fi
