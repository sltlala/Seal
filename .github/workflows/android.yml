name: Build Release APK

on:
  workflow_dispatch:

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - uses: gradle/actions/setup-gradle@v3

    - run: ./gradlew :app:assembleRelease

    - name: Move APKs to expected directory (if needed)
      run: |
        mkdir -p app/build/outputs/apk/release
        find app/build/outputs -name "*.apk" -exec mv {} app/build/outputs/apk/release/ \;

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'build-tools;29.0.3'

    - name: Get latest build-tools version
      id: get_build_tools
      run: |
        versions=$(ls $ANDROID_HOME/build-tools 2>/dev/null | sort -V)
        if [ -z "$versions" ]; then
          echo "No build-tools found. Please install one."
          exit 1
        fi
        latest=$(echo "$versions" | tail -n1)
        echo "latest_build_tools=$latest" >> $GITHUB_OUTPUT

    - name: Sign app APK
      id: sign_app
      uses: r0adkll/sign-android-release@v1
      with:
        releaseDirectory: app/build/outputs/apk/release
        signingKeyBase64: ${{ secrets.SIGNING_KEY }}
        alias: ${{ secrets.ALIAS }}
        keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
        keyPassword: ${{ secrets.KEY_PASSWORD }}
        buildToolsVersion: ${{ steps.get_build_tools.outputs.latest_build_tools }}

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: signed-apks
        path: app/build/outputs/apk/release/*.apk
        if-no-files-found: error
        retention-days: 20
